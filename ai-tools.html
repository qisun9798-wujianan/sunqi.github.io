<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 工具导航 — 红泥小火炉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root { --nav-pad: clamp(1.2rem, 3vw, 2.5rem); }

        .nav-page { min-height: 100vh; background: var(--cream); }

        /* Header */
        .nav-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,250,245,.85);
            backdrop-filter: blur(16px) saturate(1.2);
            -webkit-backdrop-filter: blur(16px) saturate(1.2);
            border-bottom: 1px solid var(--glass-border);
        }
        .nav-header-inner {
            max-width: 1200px; margin: 0 auto;
            padding: var(--nav-pad);
            display: flex; align-items: center; justify-content: space-between; gap: 1rem;
            flex-wrap: wrap;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; color: var(--ink);
        }
        .nav-brand-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, var(--blush), var(--wisteria));
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .nav-brand-text {
            font-family: var(--ff-display); font-size: var(--fs-body); font-weight: 700;
        }
        .nav-brand-text span { color: var(--blush); font-style: italic; font-weight: 400; }

        /* Search */
        .nav-search-wrap {
            position: relative; flex: 1; max-width: 420px;
        }
        .nav-search {
            width: 100%; padding: 10px 16px 10px 40px;
            border-radius: 100px; border: 1px solid var(--glass-border);
            background: rgba(255,255,255,.6);
            font-family: var(--ff-body); font-size: var(--fs-sm);
            color: var(--ink); outline: none;
            transition: all .3s var(--ease-spring);
        }
        .nav-search:focus {
            background: white; border-color: var(--blush-soft);
            box-shadow: 0 4px 14px rgba(232,120,138,.1);
        }
        .nav-search-wrap::before {
            content: '🔍'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            font-size: 14px; opacity: .5; pointer-events: none;
        }

        /* Hero */
        .nav-hero {
            text-align: center; padding: clamp(2.5rem, 6vh, 4rem) var(--nav-pad);
        }
        .nav-hero h1 {
            font-family: var(--ff-display); font-size: clamp(2rem, 5vw, 3.2rem);
            color: var(--ink); line-height: 1.1;
        }
        .nav-hero h1 em { color: var(--blush); font-style: italic; }
        .nav-hero p {
            color: var(--ink-light); font-size: var(--fs-sub);
            margin-top: .6rem; max-width: 480px; margin-inline: auto;
        }
        .nav-hero-stats {
            display: flex; gap: 1.5rem; justify-content: center;
            margin-top: 1.2rem;
        }
        .nav-stat {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .nav-stat-num {
            font-family: var(--ff-display); font-size: var(--fs-h3);
            font-weight: 700; color: var(--blush); line-height: 1;
        }
        .nav-stat-label {
            font-size: var(--fs-xs); color: var(--ink-faint); letter-spacing: .08em;
        }

        /* Category Filter */
        .nav-filter {
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
            padding: 0 var(--nav-pad) 1.5rem;
            max-width: 800px; margin: 0 auto;
        }
        .nav-filter-btn {
            padding: 8px 20px; border-radius: 100px;
            border: 1px solid rgba(255,255,255,.5);
            background: linear-gradient(145deg, rgba(255,255,255,.75), rgba(255,250,245,.45));
            font-family: var(--ff-body); font-size: var(--fs-sm);
            color: var(--ink-mid); cursor: pointer;
            transition: all .35s var(--ease-spring);
            backdrop-filter: blur(12px) saturate(1.1);
            box-shadow: 0 2px 10px rgba(80,50,110,.05), inset 0 1px 1px rgba(255,255,255,.7);
            position: relative; overflow: hidden;
            letter-spacing: .02em;
        }
        .nav-filter-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 24px rgba(80,50,110,.1), inset 0 1px 1px rgba(255,255,255,.9);
            border-color: var(--blush-soft);
            color: var(--ink);
        }
        .nav-filter-btn.active {
            background: linear-gradient(135deg, var(--blush), var(--wisteria-mid));
            color: white; border-color: transparent;
            box-shadow: 0 6px 22px rgba(232,120,138,.4), inset 0 1px 1px rgba(255,255,255,.25);
            text-shadow: 0 1px 2px rgba(0,0,0,.1);
        }
        .nav-filter-btn.active:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 28px rgba(232,120,138,.5), inset 0 1px 1px rgba(255,255,255,.3);
        }

        /* Grid */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: clamp(.8rem, 1.5vw, 1.2rem);
            max-width: 1200px; margin: 0 auto;
            padding: 0 var(--nav-pad) clamp(3rem, 6vh, 5rem);
        }

        /* Card */
        .nav-card {
            background: linear-gradient(145deg, rgba(255,255,255,.72), rgba(255,250,245,.48));
            border: 1px solid rgba(255,255,255,.65);
            border-radius: 20px;
            padding: clamp(1.2rem, 2.2vw, 1.6rem);
            text-decoration: none; color: inherit;
            transition: all .45s var(--ease-spring);
            backdrop-filter: blur(16px) saturate(1.15);
            -webkit-backdrop-filter: blur(16px) saturate(1.15);
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            box-shadow: 0 2px 10px rgba(80,50,110,.03), 0 1px 2px rgba(80,50,110,.02), inset 0 1px 0 rgba(255,255,255,.85);
        }
        /* 顶部渐变装饰线 */
        .nav-card::before {
            content: ''; position: absolute; top: 0; left: 24px; right: 24px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--blush-soft), var(--wisteria-soft), transparent);
            opacity: .5; transition: all .45s var(--ease-spring);
        }
        /* 背景光晕 */
        .nav-card::after {
            content: ''; position: absolute; top: -60%; right: -60%; width: 120%; height: 120%;
            background: radial-gradient(circle at 70% 20%, rgba(232,120,138,.05) 0%, transparent 55%);
            pointer-events: none; transition: all .45s;
        }
        .nav-card:hover {
            transform: translateY(-7px) scale(1.008);
            box-shadow: 0 24px 60px rgba(80,50,110,.1), 0 8px 24px rgba(80,50,110,.05), inset 0 1px 0 rgba(255,255,255,.95);
            border-color: rgba(232,120,138,.18);
        }
        .nav-card:hover::before {
            left: 12px; right: 12px; opacity: .9;
            background: linear-gradient(90deg, transparent, var(--blush-mid), var(--wisteria-mid), transparent);
            height: 2.5px;
        }
        .nav-card:hover::after {
            top: -40%; right: -40%;
            background: radial-gradient(circle at 70% 20%, rgba(232,120,138,.08) 0%, transparent 50%);
        }

        .nav-card-head {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: .8rem;
            position: relative; z-index: 1;
        }
        .nav-card-logo {
            width: 50px; height: 50px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--ff-display); font-size: 1.2rem; font-weight: 700;
            color: white; flex-shrink: 0;
            position: relative; overflow: hidden;
            background: linear-gradient(145deg, #fff 0%, #f8f4f0 100%);
            box-shadow: 0 4px 16px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.04), inset 0 1px 0 rgba(255,255,255,1);
            border: 1px solid rgba(230,220,210,.4);
        }
        .nav-card-logo::before {
            content: ''; position: absolute; inset: 3px; border-radius: 12px;
            background: linear-gradient(145deg, rgba(255,255,255,.9), rgba(255,250,245,.6));
            z-index: 0;
        }
        .nav-card-logo img {
            width: 60%; height: 60%;
            object-fit: contain;
            position: relative; z-index: 1;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,.06));
        }
        .nav-card-logo.fallback { 
            background: linear-gradient(135deg, var(--blush), var(--wisteria-mid));
            border: none;
            box-shadow: 0 4px 18px rgba(232,120,138,.28), 0 1px 3px rgba(0,0,0,.08);
        }
        .nav-card-logo.fallback::before { display: none; }
        .nav-card-logo.fallback.cat-img  { background: linear-gradient(135deg, #FF6B9D, #C44569); box-shadow: 0 4px 18px rgba(255,107,157,.3); }
        .nav-card-logo.fallback.cat-vid  { background: linear-gradient(135deg, #A29BFE, #6C5CE7); box-shadow: 0 4px 18px rgba(162,155,254,.3); }
        .nav-card-logo.fallback.cat-wri  { background: linear-gradient(135deg, #74B9FF, #0984E3); box-shadow: 0 4px 18px rgba(116,185,255,.3); }
        .nav-card-logo.fallback.cat-cod  { background: linear-gradient(135deg, #00B894, #00CEC9); box-shadow: 0 4px 18px rgba(0,184,148,.3); }
        .nav-card-logo.fallback.cat-mus  { background: linear-gradient(135deg, #FDCB6E, #E17055); box-shadow: 0 4px 18px rgba(253,203,110,.3); }
        .nav-card-logo.fallback.cat-def  { background: linear-gradient(135deg, var(--blush), var(--wisteria-mid)); }

        .nav-card-meta {
            flex: 1; min-width: 0;
            display: flex; flex-direction: column; gap: 3px;
        }
        .nav-card-name {
            font-family: var(--ff-display); font-size: var(--fs-body);
            font-weight: 700; color: var(--ink); line-height: 1.25;
            letter-spacing: -.01em;
        }
        .nav-card-rating {
            display: flex; align-items: center; gap: 3px;
            font-size: var(--fs-xs);
        }
        .nav-card-rating svg {
            width: 13px; height: 13px;
        }
        .nav-card-rating .star-filled { fill: #F5A623; }
        .nav-card-rating .star-empty  { fill: rgba(200,180,160,.35); }
        .nav-card-desc {
            font-size: 13px; color: var(--ink-mid); line-height: 1.7;
            margin: .5rem 0 .7rem;
            flex: 1;
            position: relative; z-index: 1;
        }
        .nav-card-footer {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            flex-wrap: wrap;
            padding-top: .7rem;
            border-top: 1px solid rgba(210,190,170,.12);
            position: relative; z-index: 1;
        }
        .nav-card-tags {
            display: flex; gap: 6px; flex-wrap: wrap;
        }
        .nav-card-tag {
            font-size: 11px; padding: 4px 11px; border-radius: 20px;
            background: rgba(255,255,255,.55);
            color: var(--ink-light);
            border: 1px solid rgba(210,190,170,.18);
            letter-spacing: .03em;
            transition: all .2s var(--ease-spring);
        }
        .nav-card:hover .nav-card-tag {
            background: rgba(255,255,255,.85);
            border-color: rgba(210,190,170,.25);
        }
        .nav-card-tag.cat {
            background: linear-gradient(135deg, rgba(232,120,138,.08), rgba(168,130,210,.06));
            color: var(--blush); 
            border-color: rgba(232,120,138,.18);
            font-weight: 600;
        }
        .nav-card:hover .nav-card-tag.cat {
            background: linear-gradient(135deg, rgba(232,120,138,.12), rgba(168,130,210,.1));
            border-color: rgba(232,120,138,.25);
        }
        .nav-card-link {
            font-size: 12px; color: var(--blush); font-weight: 600;
            display: flex; align-items: center; gap: 4px;
            opacity: 0; transform: translateX(-8px);
            transition: all .35s var(--ease-spring);
            letter-spacing: .02em;
        }
        .nav-card:hover .nav-card-link { opacity: 1; transform: translateX(0); }

        .nav-empty {
            text-align: center; padding: 4rem; color: var(--ink-light);
            grid-column: 1 / -1;
        }

        /* Footer */
        .nav-footer {
            text-align: center; padding: 2rem var(--nav-pad);
            border-top: 1px solid var(--glass-border);
            color: var(--ink-faint); font-size: var(--fs-xs);
        }

        @media (max-width: 600px) {
            .nav-grid { grid-template-columns: 1fr; }
            .nav-header-inner { flex-direction: column; align-items: stretch; }
            .nav-search-wrap { max-width: none; }
        }
    </style>
</head>
<body>
    <div class="nav-page">
        <!-- Header -->
        <header class="nav-header">
            <div class="nav-header-inner">
                <a class="nav-brand" href="index.html">
                    <div class="nav-brand-icon">🤖</div>
                    <div class="nav-brand-text">红泥小火炉 <span>AI 导航</span></div>
                </a>
                <div class="nav-search-wrap">
                    <input class="nav-search" type="text" id="searchInput" placeholder="搜索 AI 工具...">
                </div>
            </div>
        </header>

        <!-- Hero -->
        <section class="nav-hero">
            <h1>AI <em>工具导航</em></h1>
            <p>精选提升效率的 AI 工具，图像、视频、写作、代码，一站搞定</p>
            <div class="nav-hero-stats">
                <div class="nav-stat"><span class="nav-stat-num" id="statTotal">0</span><span class="nav-stat-label">工具</span></div>
                <div class="nav-stat"><span class="nav-stat-num" id="statCat">0</span><span class="nav-stat-label">分类</span></div>
            </div>
        </section>

        <!-- Filter -->
        <div class="nav-filter" id="categoryFilter">
            <button class="nav-filter-btn active" data-cat="all">全部</button>
            <button class="nav-filter-btn" data-cat="图像">🎨 图像</button>
            <button class="nav-filter-btn" data-cat="视频">🎬 视频</button>
            <button class="nav-filter-btn" data-cat="写作">✍️ 写作</button>
            <button class="nav-filter-btn" data-cat="代码">💻 代码</button>
            <button class="nav-filter-btn" data-cat="音乐">🎵 音乐</button>
        </div>

        <!-- Grid -->
        <div class="nav-grid" id="toolsGrid">
            <div class="nav-empty">加载中...</div>
        </div>

        <!-- Footer -->
        <footer class="nav-footer">
            © 红泥小火炉 · 由 Notion 驱动 · 持续更新
        </footer>
    </div>

    <script>
const AI_TOOLS = [{"id": "3509d0de-ba05-80a5-b10a-db7ddf8acc0f", "name": "豆包", "url": "https://doubao.com", "category": "", "description": "字节出品，功能全面", "tags": ["免费中文"], "rating": "⭐⭐⭐", "logo": "https://www.google.com/s2/favicons?domain=doubao.com&sz=128"}, {"id": "3509d0de-ba05-8003-ae17-c92c04792dbc", "name": "Kimi", "url": "https://kimi.moonshot.cn", "category": "", "description": "超长上下文，国产标杆", "tags": ["免费中文"], "rating": "⭐⭐⭐", "logo": "https://www.google.com/s2/favicons?domain=kimi.moonshot.cn&sz=128"}, {"id": "3509d0de-ba05-80a9-8ff4-ed293a8f11ce", "name": "Claude", "url": "https://claude.ai", "category": "", "description": "长文本理解最强，中文友好", "tags": ["付费英文"], "rating": "⭐⭐⭐", "logo": "https://www.google.com/s2/favicons?domain=claude.ai&sz=128"}, {"id": "3509d0de-ba05-8028-b9e9-c7bf18a70990", "name": "LiblibAI", "url": "https://liblib.art", "category": "", "description": "国内最大的 AI 绘画模型社区", "tags": ["付费中文"], "rating": "⭐⭐⭐", "logo": "https://www.google.com/s2/favicons?domain=liblib.art&sz=128"}, {"id": "3509d0de-ba05-8083-8b51-e0bb91176e45", "name": "可灵 AI", "url": "https://klingai.com", "category": "", "description": "快手出品，国产图像/视频双强", "tags": ["付费中文"], "rating": "⭐⭐⭐", "logo": "https://www.google.com/s2/favicons?domain=klingai.com&sz=128"}, {"id": "34f9d0de-ba05-8053-a0d3-e070d2a9a341", "name": "即梦 AI", "url": "https://jimeng.jianying.com", "category": "", "description": "字节跳动旗下 AI 绘画工具，中文友好", "tags": ["付费中文"], "rating": "⭐⭐⭐", "logo": "https://www.google.com/s2/favicons?domain=jimeng.jianying.com&sz=128"}, {"id": "34f9d0de-ba05-800b-96b9-f97c2640fc76", "name": "Midjourney", "url": "https://www.midjourney.com", "category": "", "description": "AI 图像生成，文字描述生成高质量艺术图片", "tags": ["付费英文"], "rating": "⭐⭐⭐", "logo": "https://www.google.com/s2/favicons?domain=www.midjourney.com&sz=128"}];

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[m]));
        }

        const CAT_LOGO_CLASS = {'图像':'img','视频':'vid','写作':'wri','代码':'cod','音乐':'mus'};

        const STAR_SVG = '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
        function renderStars(ratingStr) {
            const count = (ratingStr.match(/⭐/g) || []).length;
            let html = '';
            for (let i = 0; i < 5; i++) {
                html += `<svg class="${i < count ? 'star-filled' : 'star-empty'}" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
            }
            return html;
        }

        function renderTools(tools) {
            const grid = document.getElementById('toolsGrid');
            if (!tools.length) {
                grid.innerHTML = '<div class="nav-empty">没有找到匹配的工具</div>';
                return;
            }
            grid.innerHTML = tools.map(tool => {
                const logoClass = 'cat-' + (CAT_LOGO_CLASS[tool.category] || 'def');
                const logoChar = escapeHtml(tool.name).charAt(0);
                const logoHtml = tool.logo
                    ? `<img src="${tool.logo}" alt="${escapeHtml(tool.name)}" loading="lazy" onerror="this.parentElement.classList.add('fallback','${logoClass}');this.parentElement.textContent='${logoChar}';this.remove()">`
                    : logoChar;
                const fallbackClass = tool.logo ? '' : `fallback ${logoClass}`;
                return `<a class="nav-card" href="${tool.url}" target="_blank" rel="noopener">
                    <div class="nav-card-head">
                        <div class="nav-card-logo ${fallbackClass}">${logoHtml}</div>
                        <div class="nav-card-meta">
                            <span class="nav-card-name">${escapeHtml(tool.name)}</span>
                            <span class="nav-card-rating">${renderStars(tool.rating)}</span>
                        </div>
                    </div>
                    <div class="nav-card-desc">${escapeHtml(tool.description)}</div>
                    <div class="nav-card-footer">
                        <div class="nav-card-tags">
                            <span class="nav-card-tag cat">${escapeHtml(tool.category)}</span>
                            ${tool.tags.map(t => `<span class="nav-card-tag">${escapeHtml(t)}</span>`).join('')}
                        </div>
                        <span class="nav-card-link">访问 →</span>
                    </div>
                </a>`;
            }).join('');
        }

        // 初始化
        const allCategories = new Set(AI_TOOLS.map(t => t.category.split(' ')[0]));
        document.getElementById('statTotal').textContent = AI_TOOLS.length;
        document.getElementById('statCat').textContent = allCategories.size;
        renderTools(AI_TOOLS);

        // 分类筛选
        let currentCat = 'all';
        document.getElementById('categoryFilter').addEventListener('click', e => {
            if (!e.target.classList.contains('nav-filter-btn')) return;
            document.querySelectorAll('.nav-filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentCat = e.target.dataset.cat;
            filterTools();
        });

        // 搜索
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', filterTools);

        function filterTools() {
            const keyword = searchInput.value.trim().toLowerCase();
            const filtered = AI_TOOLS.filter(tool => {
                const matchCat = currentCat === 'all' || tool.category.includes(currentCat);
                const matchSearch = !keyword ||
                    tool.name.toLowerCase().includes(keyword) ||
                    tool.description.toLowerCase().includes(keyword) ||
                    tool.tags.some(t => t.toLowerCase().includes(keyword));
                return matchCat && matchSearch;
            });
            renderTools(filtered);
        }
    </script>
</body>
</html>
